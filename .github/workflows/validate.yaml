name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dev tools
        uses: jdx/mise-action@v2

      - name: Run yamllint
        run: yamllint .

      - name: Validate base manifests
        run: |
          kubectl kustomize base/ | kubeconform -ignore-missing-schemas

      - name: Validate production overlay
        run: |
          kubectl kustomize overlays/production/ | kubeconform -ignore-missing-schemas

      - name: Validate staging overlay
        run: |
          kubectl kustomize overlays/staging/ | kubeconform -ignore-missing-schemas
